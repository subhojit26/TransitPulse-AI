apiVersion: apps/v1
kind: Deployment
metadata:
  name: commuter-service
  namespace: bus-tracking
spec:
  replicas: 3
  selector:
    matchLabels:
      app: commuter-service
  template:
    metadata:
      labels:
        app: commuter-service
    spec:
      containers:
        - name: commuter-service
          image: transitpulse/commuter-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-secrets
          readinessProbe:
            httpGet:
              path: /api/commuter/stops/nearby?lat=21.14&lng=79.08&radiusMeters=5000
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests:
              cpu: 300m
              memory: 384Mi
            limits:
              cpu: 800m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: commuter-service
  namespace: bus-tracking
spec:
  type: NodePort
  selector:
    app: commuter-service
  ports:
    - port: 8083
      targetPort: 8083
      nodePort: 30083
