apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-prediction-service
  namespace: bus-tracking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-prediction-service
  template:
    metadata:
      labels:
        app: ai-prediction-service
    spec:
      containers:
        - name: ai-prediction-service
          image: transitpulse/ai-prediction-service:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-prediction-service
  namespace: bus-tracking
spec:
  selector:
    app: ai-prediction-service
  ports:
    - port: 8086
      targetPort: 8086
