apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: bus-tracking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: transitpulse/notification-service:latest
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-secrets
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: bus-tracking
spec:
  selector:
    app: notification-service
  ports:
    - port: 8087
      targetPort: 8087
