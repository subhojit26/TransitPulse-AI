apiVersion: apps/v1
kind: Deployment
metadata:
  name: bus-service
  namespace: bus-tracking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bus-service
  template:
    metadata:
      labels:
        app: bus-service
    spec:
      containers:
        - name: bus-service
          image: transitpulse/bus-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-secrets
          readinessProbe:
            httpGet:
              path: /api/buses
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/buses
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bus-service
  namespace: bus-tracking
spec:
  selector:
    app: bus-service
  ports:
    - port: 8081
      targetPort: 8081
