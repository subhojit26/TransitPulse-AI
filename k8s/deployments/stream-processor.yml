apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-processor
  namespace: bus-tracking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stream-processor
  template:
    metadata:
      labels:
        app: stream-processor
    spec:
      containers:
        - name: stream-processor
          image: transitpulse/stream-processor:latest
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
